##############################################################################
# AISKATE — Fully Private Local AI Stack
# Zero signups · Zero cloud dependencies · Apple Silicon optimized
#
# Usage:
#   docker compose up -d
#
# Endpoint:
#   Open WebUI: http://localhost:3000
#
# Prerequisites:
#   - Docker Desktop for Mac
#   - Ollama installed natively (brew install ollama)
#   - Models pulled: ollama pull qwen3:8b && ollama pull nomic-embed-text
#
# Note: Ollama runs natively on macOS (not in Docker) for direct Metal
# GPU access. Docker containers connect to it via host.docker.internal.
##############################################################################

services:

  # ─────────────────────────────────────────────────────────────────────────
  # SEARXNG — Privacy-first metasearch engine (internal infrastructure)
  # Aggregates 247+ search engines (Google, Bing, Brave, arXiv, Scholar).
  # No tracking. No signups. Not exposed to host — only used by Open WebUI.
  # ─────────────────────────────────────────────────────────────────────────
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_REDIS_URL=redis://redis:6379/0
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    depends_on:
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────────────────
  # REDIS — Cache layer for SearXNG (reduces duplicate search engine calls)
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: searxng-redis
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - redis-data:/data
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - CHOWN
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────────────
  # OPEN WEBUI — Your private AI assistant
  # Chat, web search, document RAG, knowledge bases — all in one interface.
  # Connects to native Ollama via host.docker.internal for Metal GPU.
  # Web search powered by SearXNG (multi-engine, privacy-first).
  # ─────────────────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Connect to native Ollama (running on host macOS for Metal GPU access)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Web search via SearXNG (multi-engine: Google, Bing, Brave, arXiv, Scholar)
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
      # RAG configuration
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text:latest
      # Inject RAG into system message for better caching
      - RAG_SYSTEM_CONTEXT=true
      # Increase context for web search results
      - RAG_TOP_K=5
      # Disable telemetry
      - ANONYMIZED_TELEMETRY=false
      - DO_NOT_TRACK=true
      # Allow first user to register without external auth
      - WEBUI_AUTH=true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  redis-data:
    driver: local
  open-webui-data:
    driver: local
